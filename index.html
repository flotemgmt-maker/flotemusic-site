<html lang="en">
<head>

<title>FLOTE</title>
<meta name="description" content="FLOTE — melodic bass producer. Pre-save Deep End, hear unreleased music first, explore the discography.">

<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #0a0a0a;
    --bg-elev: #141414;
    --fg: #f5f5f5;
    --fg-dim: #888;
    --fg-faint: #444;
    --border: rgba(255,255,255,0.12);
    --border-hover: rgba(255,255,255,0.35);
  }

  html, body { background: #000; color: var(--fg); }

  body {
    font-family: 'Inter Tight', -apple-system, BlinkMacSystemFont, sans-serif;
    min-height: 100vh;
    min-height: 100dvh;
    -webkit-font-smoothing: antialiased;
    -moz-osx-font-smoothing: grayscale;
    overflow-x: hidden;
    position: relative;
  }

  /* Subtle atmospheric gradient */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background: radial-gradient(ellipse 80% 50% at 50% 0%, rgba(255,255,255,0.04), transparent 70%);
    pointer-events: none;
    z-index: 0;
  }

  main {
    position: relative;
    z-index: 1;
    min-height: 100vh;
    min-height: 100dvh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 4rem 1.5rem 4rem;
    max-width: 440px;
    margin: 0 auto;
  }

  .wordmark {
    width: 80%;
    max-width: 320px;
    height: auto;
    display: block;
    margin-bottom: 1.75rem;
    opacity: 0;
    animation: fadeUp 0.9s 0.1s ease-out forwards;
  }

  .tagline {
    font-family: 'Cormorant Garamond', serif;
    font-style: italic;
    font-weight: 300;
    font-size: 1.0625rem;
    line-height: 1.5;
    color: var(--fg-dim);
    letter-spacing: 0.01em;
    text-align: center;
    margin-bottom: 3rem;
    max-width: 32ch;
    opacity: 0;
    animation: fadeUp 0.9s 0.3s ease-out forwards;
  }

  .tagline .title {
    font-style: normal;
    font-family: 'Inter Tight', sans-serif;
    font-weight: 500;
    color: var(--fg);
    letter-spacing: 0;
  }

  .links {
    width: 100%;
    display: flex;
    flex-direction: column;
    gap: 0.875rem;
  }

  .link {
    display: flex;
    align-items: center;
    justify-content: space-between;
    width: 100%;
    padding: 1.125rem 1.375rem;
    background: var(--bg-elev);
    border: 1px solid var(--border);
    border-radius: 14px;
    color: var(--fg);
    text-decoration: none;
    font-weight: 500;
    font-size: 1rem;
    letter-spacing: 0.01em;
    transition: transform 0.18s ease, border-color 0.18s ease, background 0.18s ease;
    opacity: 0;
    animation: fadeUp 0.9s ease-out forwards;
    -webkit-tap-highlight-color: transparent;
  }
  .link:nth-child(1) { animation-delay: 0.5s; }
  .link:nth-child(2) { animation-delay: 0.6s; }
  .link:nth-child(3) { animation-delay: 0.7s; }

  .link:hover, .link:focus-visible {
    border-color: var(--border-hover);
    background: #1c1c1c;
    transform: translateY(-1px);
    outline: none;
  }

  .link:active { transform: translateY(0); }

  .link-text {
    display: flex;
    flex-direction: column;
    gap: 0.15rem;
  }

  .link-label {
    font-size: 1rem;
    font-weight: 500;
  }

  .link-meta {
    font-size: 0.75rem;
    color: var(--fg-dim);
    letter-spacing: 0.04em;
    text-transform: uppercase;
    font-weight: 400;
  }

  .link-arrow {
    width: 18px;
    height: 18px;
    color: var(--fg-dim);
    transition: transform 0.18s ease, color 0.18s ease;
    flex-shrink: 0;
  }

  .link:hover .link-arrow, .link:focus-visible .link-arrow {
    transform: translateX(4px);
    color: var(--fg);
  }

  footer {
    margin-top: 3.5rem;
    text-align: center;
    opacity: 0;
    animation: fadeUp 0.9s 0.9s ease-out forwards;
  }

  .socials {
    display: flex;
    gap: 1.5rem;
    justify-content: center;
    margin-bottom: 1.25rem;
  }

  .socials a {
    color: var(--fg-faint);
    transition: color 0.18s ease;
    display: inline-flex;
    -webkit-tap-highlight-color: transparent;
  }

  .socials a:hover, .socials a:focus-visible {
    color: var(--fg);
    outline: none;
  }

  .socials svg { width: 20px; height: 20px; }

  .copyright {
    font-size: 0.6875rem;
    color: var(--fg-faint);
    letter-spacing: 0.08em;
    text-transform: uppercase;
  }

  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(12px); }
    to { opacity: 1; transform: translateY(0); }
  }

  @media (prefers-reduced-motion: reduce) {
    *, *::before, *::after {
      animation-duration: 0.01ms !important;
      animation-iteration-count: 1 !important;
      transition-duration: 0.01ms !important;
    }
  }

  @media (max-width: 360px) {
    main { padding: 3rem 1.25rem 3rem; }
    .wordmark { margin-bottom: 1.5rem; }
    .tagline { margin-bottom: 2.5rem; font-size: 1rem; }
  }
</style>
</head>
