<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #0a0a0a;
    --bg-elev: #141414;
    --fg: #f5f5f5;
    --fg-dim: #888;
    --fg-faint: #444;
    --border: rgba(255,255,255,0.12);
    --border-hover: rgba(255,255,255,0.35);
  }

  html, body { background: #000; color: var(--fg); }

  body {
    font-family: 'Inter Tight', -apple-system, BlinkMacSystemFont, sans-serif;
    min-height: 100vh;
    min-height: 100dvh;
    -webkit-font-smoothing: antialiased;
    -moz-osx-font-smoothing: grayscale;
    overflow-x: hidden;
    position: relative;
  }

  /* === Animated gradient drift (visible) ===
     Three drifting soft lights with overlap. Higher opacity, slightly slower
     animation. Plus a vignette to frame the content. */
  .gradient-a, .gradient-b, .gradient-c {
    position: fixed;
    inset: -30% -30% -30% -30%;
    pointer-events: none;
    z-index: 0;
    filter: blur(60px);
    will-change: transform, opacity;
  }

  .gradient-a {
    background: radial-gradient(ellipse 45% 32% at 25% 20%, rgba(255,255,255,0.14), transparent 65%);
    animation: drift-a 22s ease-in-out infinite alternate;
  }

  .gradient-b {
    background: radial-gradient(ellipse 40% 28% at 75% 80%, rgba(255,255,255,0.11), transparent 65%);
    animation: drift-b 26s ease-in-out infinite alternate;
  }

  .gradient-c {
    background: radial-gradient(ellipse 35% 25% at 60% 45%, rgba(255,255,255,0.08), transparent 70%);
    animation: drift-c 30s ease-in-out infinite alternate;
  }

  @keyframes drift-a {
    0%   { transform: translate(0, 0) scale(1); opacity: 0.7; }
    100% { transform: translate(15%, 10%) scale(1.25); opacity: 1; }
  }

  @keyframes drift-b {
    0%   { transform: translate(0, 0) scale(1); opacity: 0.6; }
    100% { transform: translate(-14%, -10%) scale(1.2); opacity: 0.95; }
  }

  @keyframes drift-c {
    0%   { transform: translate(0, 0) scale(0.95); opacity: 0.4; }
    100% { transform: translate(-10%, 12%) scale(1.15); opacity: 0.85; }
  }

  /* Vignette — frames the content, makes the moving gradient feel intentional */
  .vignette {
    position: fixed;
    inset: 0;
    pointer-events: none;
    z-index: 1;
    background: radial-gradient(ellipse 90% 80% at 50% 50%, transparent 40%, rgba(0,0,0,0.55) 100%);
  }

  /* === Grain texture overlay (visible) ===
     Punched up. Higher opacity, slightly coarser grain, soft-light blend
     for more obvious texture. */
  .grain {
    position: fixed;
    inset: 0;
    pointer-events: none;
    z-index: 2;
    opacity: 0.22;
    mix-blend-mode: soft-light;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noiseFilter'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.7' numOctaves='3' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noiseFilter)'/%3E%3C/svg%3E");
    background-size: 180px 180px;
  }

  main {
    position: relative;
    z-index: 3;
    min-height: 100vh;
    min-height: 100dvh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 4rem 1.5rem 4rem;
    max-width: 440px;
    margin: 0 auto;
  }

  .wordmark {
    width: 80%;
    max-width: 320px;
    height: auto;
    display: block;
    margin-bottom: 1.75rem;
    opacity: 0;
    animation: fadeUp 0.9s 0.1s ease-out forwards;
  }

  .tagline {
    font-family: 'Cormorant Garamond', serif;
    font-style: italic;
    font-weight: 300;
    font-size: 1.0625rem;
    line-height: 1.5;
    color: var(--fg-dim);
    letter-spacing: 0.01em;
    text-align: center;
    margin-bottom: 3rem;
    max-width: 32ch;
    opacity: 0;
    animation: fadeUp 0.9s 0.3s ease-out forwards;
  }

  .tagline .title {
    font-style: normal;
    font-family: 'Inter Tight', sans-serif;
    font-weight: 500;
    color: var(--fg);
    letter-spacing: 0;
  }

  .links {
    width: 100%;
    display: flex;
    flex-direction: column;
    gap: 0.875rem;
  }

  .link {
    display: flex;
    align-items: center;
    justify-content: space-between;
    width: 100%;
    padding: 1.125rem 1.375rem;
    background: var(--bg-elev);
    border: 1px solid var(--border);
    border-radius: 14px;
    color: var(--fg);
    text-decoration: none;
    font-weight: 500;
    font-size: 1rem;
    letter-spacing: 0.01em;
    transition: transform 0.18s ease, border-color 0.18s ease, background 0.18s ease;
    opacity: 0;
    animation: fadeUp 0.9s ease-out forwards;
    -webkit-tap-highlight-color: transparent;
  }
  .link:nth-child(1) { animation-delay: 0.5s; }
  .link:nth-child(2) { animation-delay: 0.6s; }
  .link:nth-child(3) { animation-delay: 0.7s; }

  .link:hover, .link:focus-visible {
    border-color: var(--border-hover);
    background: #1c1c1c;
    transform: translateY(-1px);
    outline: none;
  }

  .link:active { transform: translateY(0); }

  .link-text {
    display: flex;
    flex-direction: column;
    gap: 0.15rem;
  }

  .link-label { font-size: 1rem; font-weight: 500; }

  .link-meta {
    font-size: 0.75rem;
    color: var(--fg-dim);
    letter-spacing: 0.04em;
    text-transform: uppercase;
    font-weight: 400;
  }

  .link-arrow {
    width: 18px;
    height: 18px;
    color: var(--fg-dim);
    transition: transform 0.18s ease, color 0.18s ease;
    flex-shrink: 0;
  }

  .link:hover .link-arrow, .link:focus-visible .link-arrow {
    transform: translateX(4px);
    color: var(--fg);
  }

  footer {
    margin-top: 3.5rem;
    display: flex;
    flex-direction: column;
    align-items: center;
    opacity: 0;
    animation: fadeUp 0.9s 0.9s ease-out forwards;
  }

  /* === Tiny portrait in footer ===
     Circular, 36px, subtle border. Sits above socials.
     Remove this whole .portrait block + the <img> in HTML to strip the photo. */
  .portrait {
    width: 36px;
    height: 36px;
    border-radius: 50%;
    object-fit: cover;
    margin-bottom: 1rem;
    border: 1px solid rgba(255,255,255,0.15);
    filter: grayscale(0.2);
    transition: filter 0.4s ease, transform 0.4s ease;
  }

  .portrait:hover { filter: grayscale(0); transform: scale(1.05); }

  .socials {
    display: flex;
    gap: 1.5rem;
    justify-content: center;
    margin-bottom: 1.25rem;
  }

  .socials a {
    color: var(--fg-faint);
    transition: color 0.18s ease;
    display: inline-flex;
    -webkit-tap-highlight-color: transparent;
  }

  .socials a:hover, .socials a:focus-visible {
    color: var(--fg);
    outline: none;
  }

  .socials svg { width: 20px; height: 20px; }

  .copyright {
    font-size: 0.6875rem;
    color: var(--fg-faint);
    letter-spacing: 0.08em;
    text-transform: uppercase;
  }

  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(12px); }
    to { opacity: 1; transform: translateY(0); }
  }

  @media (prefers-reduced-motion: reduce) {
    *, *::before, *::after {
      animation-duration: 0.01ms !important;
      animation-iteration-count: 1 !important;
      transition-duration: 0.01ms !important;
    }
    .gradient-a, .gradient-b, .gradient-c { animation: none; }
  }

  @media (max-width: 360px) {
    main { padding: 3rem 1.25rem 3rem; }
    .wordmark { margin-bottom: 1.5rem; }
    .tagline { margin-bottom: 2.5rem; font-size: 1rem; }
  }
</style>
</head>

<div class="gradient-c" aria-hidden="true"></div>
<div class="vignette" aria-hidden="true"></div>
